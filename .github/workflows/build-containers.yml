---
name: Publish Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Branch, tag, or full commit SHA to build and publish"
        required: false

concurrency:
  group: postiz-app-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-image-common:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    outputs:
      full_sha: ${{ steps.meta.outputs.full_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      image: ${{ steps.meta.outputs.image }}
    env:
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Resolve image target
        id: meta
        run: |
          image_name="${IMAGE_NAME:-postiz-app}"
          image_name="${image_name,,}"
          full_sha="$(git rev-parse HEAD)"
          short_sha="${full_sha:0:7}"
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${image_name}"
          {
            echo "image=${image}"
            echo "full_sha=${full_sha}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

  build-containers:
    if: github.server_url == 'https://github.com'
    needs: publish-image-common
    strategy:
      matrix:
        include:
          - runnertags: ubuntu-latest
            arch: amd64
          - runnertags: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runnertags }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push architecture image
        env:
          IMAGE: ${{ needs.publish-image-common.outputs.image }}
          FULL_SHA: ${{ needs.publish-image-common.outputs.full_sha }}
          SHORT_SHA: ${{ needs.publish-image-common.outputs.short_sha }}
        run: |
          docker buildx build --platform linux/${{ matrix.arch }} \
            -f Dockerfile.dev \
            -t "${IMAGE}:sha-${FULL_SHA}-${{ matrix.arch }}" \
            -t "${IMAGE}:sha-${SHORT_SHA}-${{ matrix.arch }}" \
            --build-arg NEXT_PUBLIC_VERSION="sha-${SHORT_SHA}" \
            --pull \
            --provenance=false --sbom=false \
            --push \
            .

  build-container-manifest:
    if: github.server_url == 'https://github.com'
    needs: [publish-image-common, build-containers]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker manifests
        env:
          IMAGE: ${{ needs.publish-image-common.outputs.image }}
          FULL_SHA: ${{ needs.publish-image-common.outputs.full_sha }}
          SHORT_SHA: ${{ needs.publish-image-common.outputs.short_sha }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:sha-${FULL_SHA}-amd64"
          docker buildx imagetools inspect "${IMAGE}:sha-${FULL_SHA}-arm64"

          docker manifest rm "${IMAGE}:sha-${FULL_SHA}" || true
          docker manifest create "${IMAGE}:sha-${FULL_SHA}" \
            --amend "${IMAGE}:sha-${FULL_SHA}-amd64" \
            --amend "${IMAGE}:sha-${FULL_SHA}-arm64"
          docker manifest push "${IMAGE}:sha-${FULL_SHA}"

          docker manifest rm "${IMAGE}:sha-${SHORT_SHA}" || true
          docker manifest create "${IMAGE}:sha-${SHORT_SHA}" \
            --amend "${IMAGE}:sha-${SHORT_SHA}-amd64" \
            --amend "${IMAGE}:sha-${SHORT_SHA}-arm64"
          docker manifest push "${IMAGE}:sha-${SHORT_SHA}"

      - name: Verify manifest
        env:
          IMAGE: ${{ needs.publish-image-common.outputs.image }}
          FULL_SHA: ${{ needs.publish-image-common.outputs.full_sha }}
        run: docker manifest inspect "${IMAGE}:sha-${FULL_SHA}"
