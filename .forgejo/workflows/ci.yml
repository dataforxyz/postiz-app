name: CI

# Expected Forgejo configuration:
# - repo variable REGISTRY_HOST (optional; defaults to the Forgejo host)
# - repo variable IMAGE_REPO (optional; defaults to owner/repo)
# - repo secret REGISTRY_USERNAME
# - repo secret REGISTRY_PASSWORD

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
    tags:
      - staging
      - prod
  workflow_dispatch:

concurrency:
  group: postiz-app-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest-xl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f Dockerfile.dev -t postiz-app-ci:${{ github.sha }} .

  publish-image:
    name: Publish Image
    runs-on: ubuntu-latest-xl
    needs: [docker-build]
    if: github.event_name != 'pull_request'
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      IMAGE_REPO: ${{ vars.IMAGE_REPO }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image target
        id: meta
        run: |
          registry_host="${REGISTRY_HOST:-${GITHUB_SERVER_URL#https://}}"
          image_repo="${IMAGE_REPO:-${GITHUB_REPOSITORY,,}}"
          echo "registry_host=${registry_host}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login "${{ steps.meta.outputs.registry_host }}" \
            --username "${REGISTRY_USERNAME}" \
            --password-stdin

      - name: Build and push image
        run: |
          image="${{ steps.meta.outputs.registry_host }}/${{ steps.meta.outputs.image_repo }}"
          docker build \
            -f Dockerfile.dev \
            -t "${image}:sha-${GITHUB_SHA}" \
            .
          docker push "${image}:sha-${GITHUB_SHA}"

  promote-tag:
    name: Promote to ${{ github.ref_name }}
    runs-on: ubuntu-latest-xl
    needs: [publish-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      IMAGE_REPO: ${{ vars.IMAGE_REPO }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Resolve image target
        id: meta
        run: |
          registry_host="${REGISTRY_HOST:-${GITHUB_SERVER_URL#https://}}"
          image_repo="${IMAGE_REPO:-${GITHUB_REPOSITORY,,}}"
          echo "registry_host=${registry_host}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login "${{ steps.meta.outputs.registry_host }}" \
            --username "${REGISTRY_USERNAME}" \
            --password-stdin

      - name: Retag sha to ${{ github.ref_name }}
        run: |
          set -euo pipefail
          image="${{ steps.meta.outputs.registry_host }}/${{ steps.meta.outputs.image_repo }}"
          docker pull "${image}:sha-${GITHUB_SHA}"
          docker tag "${image}:sha-${GITHUB_SHA}" "${image}:${{ github.ref_name }}"
          docker push "${image}:${{ github.ref_name }}"