name: CI

# Expected Forgejo configuration:
# - repo variable REGISTRY_HOST (optional; defaults to the Forgejo host)
# - repo variable IMAGE_REPO (optional; defaults to owner/repo)
# - repo secret REGISTRY_USERNAME
# - repo secret REGISTRY_PASSWORD

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: postiz-app-${{ github.workflow }}-${{ github.job }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest-xl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f Dockerfile.dev -t postiz-app-ci:${{ github.sha }} .
